<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Alex+Brush&family=Press+Start+2P&family=Quicksand:wght@400;500;600;700&display=swap');

:root{ --bg:#221014; --panel:#2f171a; --red:#B03039; --pink:#e8475a; --cream:#f2e2dc; --text-dim:#d8bcb8; --gold:#e0a030; }
*{ box-sizing: border-box; }
body{ margin: 0; background: var(--bg); color: var(--cream); font-family: 'Quicksand', sans-serif;
  background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 22px 22px; }
.wrap{ max-width: 700px; margin: 0 auto; padding: 3rem 1.5rem 6rem; }

.title-row{ display:flex; align-items:center; justify-content:center; gap: 4px; margin: 0 0 1.5rem; }
.page-title{ font-family: 'Dancing Script', cursive; font-weight: 700; font-size: 42px; color: var(--pink); margin: 0; line-height: 1; }
.title-swash{ width: 150px; height: 52px; margin-bottom: 2px; }

.key-chart-flat{ display:flex; align-items:center; gap: 18px; overflow-x: auto; padding: 10px 4px; margin-bottom: 0.8rem; white-space: nowrap; }
.key-chart-flat .key-item{ flex-shrink: 0; }
.key-item{ display:flex; align-items:center; gap: 7px; font-family: 'Quicksand', sans-serif; font-size: 12px; }
.key-icon{ width: 20px; height: 20px; flex-shrink: 0; object-fit: contain; }
.key-term{ font-weight: 700; color: var(--cream); }
.key-new .key-term{ color: var(--gold); animation: key-new-pulse 1.2s ease-in-out infinite; display:inline-block; }
@keyframes key-new-pulse{ 0%,100%{ opacity: 1; transform: scale(1); } 50%{ opacity: 0.6; transform: scale(1.12); } }

.xxx-base{ font-family: 'Press Start 2P', monospace; display:inline-block; }
.xxx-gradient{
  background: linear-gradient(90deg, #4C0507, #B03039, #e8475a, #ff8fa3, #B03039, #4C0507);
  background-size: 300% auto; -webkit-background-clip: text; background-clip: text; color: transparent;
  animation: xxx-gradient-move 2.4s linear infinite;
}
@keyframes xxx-gradient-move{ to{ background-position: -300% center; } }

.pwp-tagline{ text-align:center; font-family: 'Alex Brush', cursive; font-size: 26px; color: var(--pink); margin: 0 0 2.5rem; white-space: nowrap; }
.pwp-tagline span{ color: var(--cream); }
@media (max-width: 600px){ .pwp-tagline{ font-size: 4.2vw; } }

.legend-row{ display:flex; gap: 18px; justify-content:center; margin-bottom: 2rem; font-family: 'Press Start 2P', monospace; font-size: 8px; }
.legend-item{ display:flex; align-items:center; gap: 6px; }
.legend-dot{ width: 9px; height: 9px; border-radius: 50%; }
.legend-dot.complete{ background: var(--text-dim); }
.legend-dot.ongoing{ background: var(--gold); box-shadow: 0 0 6px var(--gold); }

.index-fandom{ font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--pink); letter-spacing: 1px; margin: 1.8rem 0 0.6rem; border-bottom: 1px solid var(--red); padding-bottom: 6px; }
.index-fandom:first-child{ margin-top: 0; }
.index-row{ display:flex; gap: 10px; align-items:baseline; padding: 5px 0; font-family: 'Quicksand', sans-serif; }
.index-row-title{ color: var(--cream); font-weight: 600; font-size: 14px; }
.index-row-dots{ flex:1; border-bottom: 1px dotted var(--text-dim); position:relative; top:-4px; }
.index-row-meta{ font-family: 'Press Start 2P', monospace; font-size: 7px; white-space: nowrap; }
.index-row-meta.complete{ color: var(--text-dim); }
.index-row-meta.ongoing{ color: var(--gold); text-shadow: 0 0 4px rgba(224,160,48,0.5); }

.fab{ position: fixed; bottom: 24px; right: 24px; z-index: 100; }
.fab-toggle{ width: 58px; height: 58px; border-radius: 50%; background: var(--red); border: none; cursor: pointer; display:flex; align-items:center; justify-content:center; box-shadow: 0 6px 18px rgba(0,0,0,0.5); }
.fab-toggle svg{ width: 32px; height: 32px; }
.fab-menu{ position: absolute; bottom: 70px; right: 0; background: var(--panel); border: 2px solid var(--pink); border-radius: 14px; padding: 14px 18px; display:flex; flex-direction:column; gap: 14px; opacity: 0; pointer-events:none; transform: translateY(10px); transition: all 0.2s ease; white-space: nowrap; }
.fab:hover .fab-menu, .fab:focus-within .fab-menu{ opacity: 1; pointer-events: all; transform: translateY(0); }
.fab-menu a{ font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--text-dim); text-decoration: none; }
.fab-menu a:hover, .fab-menu a.current{ color: var(--pink); }
</style>
</head>
