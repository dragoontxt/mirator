<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="mirator-title mirator-desc">
<title id="mirator-title">mirator</title>
<desc id="mirator-desc">A romantic wordmark reading "mirator" in a flowing script, set against a deep wine background, with the tagline "stories written with love and angst, from the human heart and mind."</desc>

<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&amp;family=Press+Start+2P&amp;family=Quicksand:wght@500;600&amp;display=swap');
    .script{ font-family: 'Alex Brush', 'Segoe Script', 'Brush Script MT', cursive; }
    .pixel{ font-family: 'Press Start 2P', monospace; }
    .quicksand{ font-family: 'Quicksand', sans-serif; }
  </style>

  <radialGradient id="bgGlow" cx="50%" cy="42%" r="75%">
    <stop offset="0%" stop-color="#3a1c22"/>
    <stop offset="55%" stop-color="#2f171a"/>
    <stop offset="100%" stop-color="#1c0d10"/>
  </radialGradient>

  <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#f8e3de"/>
    <stop offset="45%" stop-color="#f2c9cf"/>
    <stop offset="100%" stop-color="#e8475a"/>
  </linearGradient>

  <linearGradient id="lineFade" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#e8475a" stop-opacity="0"/>
    <stop offset="50%" stop-color="#e0a030" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#e8475a" stop-opacity="0"/>
  </linearGradient>

  <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <pattern id="grain" width="22" height="22" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.045"/>
  </pattern>
</defs>

<!-- background -->
<rect width="900" height="360" fill="url(#bgGlow)"/>
<rect width="900" height="360" fill="url(#grain)"/>
<rect x="10" y="10" width="880" height="340" rx="18" fill="none" stroke="#B03039" stroke-width="2" opacity="0.55"/>
<rect x="18" y="18" width="864" height="324" rx="14" fill="none" stroke="#e0a030" stroke-width="1" opacity="0.28" stroke-dasharray="2 6"/>

<g transform="translate(0,-38)">
  <!-- top hairline -->
  <line x1="120" y1="118" x2="780" y2="118" stroke="url(#lineFade)" stroke-width="1.5"/>

  <!-- wordmark -->
  <text x="450" y="235" text-anchor="middle" class="script" font-size="168" fill="url(#textGrad)" filter="url(#softGlow)">mirator</text>

  <!-- bottom hairline with heart -->
  <line x1="120" y1="272" x2="418" y2="272" stroke="url(#lineFade)" stroke-width="1.5"/>
  <line x1="482" y1="272" x2="780" y2="272" stroke="url(#lineFade)" stroke-width="1.5"/>
  <path d="M450,266 C445,258 434,258 434,268 C434,275 450,283 450,283 C450,283 466,275 466,268 C466,258 455,258 450,266 Z" fill="#e8475a"/>

  <!-- tagline -->
  <text x="450" y="304" text-anchor="middle" class="pixel" font-size="9" letter-spacing="1.5" fill="#d8bcb8">STORIES WRITTEN WITH LOVE AND ANGST,</text>
  <text x="450" y="318" text-anchor="middle" class="pixel" font-size="9" letter-spacing="1.5" fill="#d8bcb8">FROM THE HUMAN HEART AND MIND</text>
  <text x="450" y="341" text-anchor="middle" class="quicksand" font-size="12" fill="#e0a030" font-style="italic">"one who gazes, one who admires."</text>
</g>

</svg>
